<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="RAG Performance Prediction Framework — Master's Dissertation" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG Performance Prediction Framework</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧭</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        /* Brand */
        --brand-1: #6366f1;   /* indigo */
        --brand-2: #06b6d4;   /* cyan   */
        --brand-3: #8b5cf6;   /* violet */
        --grad: linear-gradient(120deg, var(--brand-1), var(--brand-3) 55%, var(--brand-2));

        /* Surfaces (light) */
        --bg: #f4f5fb;
        --bg-soft: #eef0f8;
        --surface: #ffffff;
        --surface-2: #fbfbfe;
        --sidebar: #0b1020;
        --sidebar-2: #131a30;

        /* Text */
        --text: #111527;
        --text-2: #5b6376;
        --text-3: #97a0b5;
        --border: #e7e9f2;
        --border-strong: #d4d8e8;

        /* Status */
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
        --info: #3b82f6;

        /* Domain hues */
        --tech: #4f7cff;
        --health: #14b8a6;
        --hist: #f59e0b;

        --radius: 16px;
        --radius-sm: 10px;
        --shadow-sm: 0 1px 2px rgba(16,21,39,.06), 0 1px 3px rgba(16,21,39,.04);
        --shadow: 0 6px 24px rgba(16,21,39,.07), 0 2px 8px rgba(16,21,39,.04);
        --shadow-lg: 0 20px 50px rgba(16,21,39,.12), 0 8px 18px rgba(16,21,39,.06);
        --ease: cubic-bezier(.4, 0, .2, 1);
      }

      body.dark {
        --bg: #070a16;
        --bg-soft: #0b1020;
        --surface: #111729;
        --surface-2: #0e1424;
        --sidebar: #05070f;
        --sidebar-2: #0c1326;
        --text: #eef1f9;
        --text-2: #a4adc4;
        --text-3: #6b748c;
        --border: #1f2740;
        --border-strong: #2a3552;
        --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
        --shadow: 0 10px 30px rgba(0,0,0,.45);
        --shadow-lg: 0 24px 60px rgba(0,0,0,.55);
      }

      body {
        font-family: 'Inter', system-ui, sans-serif;
        background:
          radial-gradient(1200px 600px at 110% -10%, rgba(99,102,241,.10), transparent 60%),
          radial-gradient(900px 500px at -10% 110%, rgba(6,182,212,.10), transparent 55%),
          var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        transition: background .35s var(--ease), color .35s var(--ease);
      }
      #root { display: flex; min-height: 100vh; }
      h1, h2, h3, h4 { font-family: 'Sora', 'Inter', sans-serif; letter-spacing: -.01em; }

      /* ── Animations ── */
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
      @keyframes scaleIn { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: scale(1); } }
      @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
      @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
      .animate-fade { animation: fadeIn .5s var(--ease) both; }
      .stagger-1 { animation-delay: .06s; } .stagger-2 { animation-delay: .12s; }
      .stagger-3 { animation-delay: .18s; } .stagger-4 { animation-delay: .24s; }

      /* ── Sidebar ── */
      .sidebar {
        width: 268px; flex-shrink: 0; position: sticky; top: 0; height: 100vh;
        display: flex; flex-direction: column; color: #e8ecf8;
        background: linear-gradient(180deg, var(--sidebar), var(--sidebar-2));
        border-right: 1px solid rgba(255,255,255,.06);
      }
      .sidebar-header { padding: 26px 22px 20px; border-bottom: 1px solid rgba(255,255,255,.07); }
      .brand-badge {
        width: 38px; height: 38px; border-radius: 11px; background: var(--grad);
        display: grid; place-items: center; font-size: 19px; margin-bottom: 14px;
        box-shadow: 0 8px 20px rgba(99,102,241,.45);
      }
      .sidebar-header h1 { font-size: 15px; font-weight: 700; line-height: 1.35; color: #fff; }
      .sidebar-header p { font-size: 11.5px; color: #8b94ad; margin-top: 5px; line-height: 1.5; }
      .sidebar-nav { flex: 1; padding: 14px 12px; overflow-y: auto; }
      .nav-section { font-size: 10px; text-transform: uppercase; letter-spacing: .12em;
        color: #59617a; padding: 14px 12px 6px; font-weight: 700; }
      .sidebar-nav button {
        display: flex; align-items: center; gap: 12px; width: 100%; position: relative;
        padding: 11px 13px; border: none; border-radius: 11px; background: transparent;
        color: #aab2c8; font-size: 13.5px; font-weight: 500; cursor: pointer; text-align: left;
        font-family: inherit; margin-bottom: 3px; transition: all .18s var(--ease);
      }
      .sidebar-nav button svg { width: 18px; height: 18px; flex-shrink: 0; }
      .sidebar-nav button:hover { background: rgba(255,255,255,.06); color: #fff; }
      .sidebar-nav button.active {
        background: linear-gradient(120deg, rgba(99,102,241,.22), rgba(6,182,212,.16));
        color: #fff;
      }
      .sidebar-nav button.active::before {
        content: ''; position: absolute; left: -12px; top: 50%; transform: translateY(-50%);
        width: 4px; height: 22px; border-radius: 0 4px 4px 0; background: var(--grad);
      }
      .sidebar-footer { padding: 16px; border-top: 1px solid rgba(255,255,255,.07); }
      .theme-toggle {
        display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;
        padding: 10px; border-radius: 10px; cursor: pointer; font-family: inherit; font-size: 12.5px;
        color: #cdd4e6; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08);
        transition: all .2s var(--ease);
      }
      .theme-toggle:hover { background: rgba(255,255,255,.1); color: #fff; }
      .theme-toggle svg { width: 16px; height: 16px; }

      /* ── Main ── */
      .main { flex: 1; overflow-y: auto; padding: 30px 40px 60px; animation: fadeIn .4s var(--ease); }
      .page-header { margin-bottom: 26px; }
      .page-header .eyebrow {
        font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
        color: var(--brand-1); margin-bottom: 8px;
      }
      .page-header h2 { font-size: 28px; font-weight: 800; line-height: 1.15; }
      .page-header p { color: var(--text-2); margin-top: 8px; font-size: 14.5px; max-width: 720px; line-height: 1.65; }

      /* ── Cards ── */
      .card {
        background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
        padding: 24px; margin-bottom: 18px; box-shadow: var(--shadow-sm);
        transition: box-shadow .3s var(--ease), transform .3s var(--ease), border-color .3s var(--ease);
        animation: fadeIn .45s var(--ease) both;
      }
      .card:hover { box-shadow: var(--shadow); }
      .card h3 { font-size: 15.5px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 9px; }
      .card h4 { font-size: 13.5px; font-weight: 600; }
      .card-pad-lg { padding: 30px; }

      /* ── Grids ── */
      .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
      .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
      .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }

      /* ── KPI ── */
      .kpi { text-align: left; position: relative; overflow: hidden; }
      .kpi::after {
        content: ''; position: absolute; inset: 0 auto 0 0; width: 3px; background: var(--grad);
        opacity: 0; transition: opacity .3s var(--ease);
      }
      .kpi:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
      .kpi:hover::after { opacity: 1; }
      .kpi-value { font-family: 'Sora', sans-serif; font-size: 30px; font-weight: 800; line-height: 1.1; animation: scaleIn .5s var(--ease); }
      .kpi-label { font-size: 12px; color: var(--text-2); margin-top: 8px; font-weight: 600; }
      .kpi-sub { font-size: 11px; color: var(--text-3); margin-top: 3px; }

      /* ── Selectors ── */
      .selector-group { display: flex; flex-direction: column; gap: 9px; }
      .selector-option {
        display: flex; align-items: center; gap: 13px; padding: 14px 16px; cursor: pointer;
        border: 1.5px solid var(--border); border-radius: 12px; background: var(--surface-2);
        transition: all .2s var(--ease);
      }
      .selector-option:hover { border-color: var(--brand-1); transform: translateX(3px); }
      .selector-option.selected {
        border-color: var(--brand-1);
        background: linear-gradient(120deg, rgba(99,102,241,.08), rgba(6,182,212,.06));
        box-shadow: 0 4px 14px rgba(99,102,241,.12);
      }
      .selector-option .indicator {
        width: 20px; height: 20px; border: 2px solid var(--border-strong); border-radius: 50%;
        flex-shrink: 0; position: relative; transition: all .2s var(--ease);
      }
      .selector-option.selected .indicator { border-color: var(--brand-1); background: var(--brand-1); }
      .selector-option.selected .indicator::after {
        content: '✓'; position: absolute; inset: 0; display: grid; place-items: center;
        color: #fff; font-size: 11px; font-weight: 800;
      }
      .selector-option .label { font-size: 13.5px; font-weight: 600; }
      .selector-option .desc { font-size: 11.5px; color: var(--text-2); margin-top: 1px; }

      /* ── Metric cards ── */
      .metric-card {
        padding: 17px; border-radius: 12px; background: var(--surface-2); border: 1px solid var(--border);
        transition: all .3s var(--ease); animation: scaleIn .3s var(--ease);
      }
      .metric-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
      .metric-card .name { font-size: 11px; color: var(--text-2); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
      .metric-card .value { font-family: 'Sora', sans-serif; font-size: 25px; font-weight: 800; margin-top: 6px; }
      .metric-card .range { font-size: 11px; color: var(--text-3); margin-top: 4px; }
      .metric-card .mae { font-size: 11px; color: var(--text-3); padding-top: 5px; border-top: 1px solid var(--border); margin-top: 7px; }

      /* ── Buttons ── */
      .btn { display: inline-flex; align-items: center; gap: 8px; padding: 11px 20px; border: none;
        border-radius: 11px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
        transition: all .2s var(--ease); }
      .btn svg { width: 16px; height: 16px; }
      .btn-primary { background: var(--grad); color: #fff; box-shadow: 0 8px 20px rgba(99,102,241,.3); }
      .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 26px rgba(99,102,241,.4); }
      .btn-outline { background: transparent; border: 1.5px solid var(--border-strong); color: var(--text); }
      .btn-outline:hover { background: var(--bg-soft); transform: translateY(-1px); }

      /* ── Tables ── */
      table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
      th { text-align: left; padding: 11px 14px; border-bottom: 2px solid var(--border);
        font-weight: 700; color: var(--text-2); font-size: 10.5px; text-transform: uppercase; letter-spacing: .07em; }
      td { padding: 12px 14px; border-bottom: 1px solid var(--border); }
      tbody tr { transition: background .15s var(--ease); }
      tbody tr:hover td { background: var(--bg-soft); }
      tr:last-child td { border-bottom: none; }
      .domain-badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; color: #fff; }

      /* ── Recommendation ── */
      .recommendation { padding: 16px 18px; border-left: 3px solid var(--brand-1);
        background: var(--surface-2); border-radius: 0 12px 12px 0; margin-bottom: 13px; transition: all .25s var(--ease); }
      .recommendation:hover { transform: translateX(2px); }
      .recommendation h4 { font-size: 12.5px; font-weight: 700; }
      .recommendation p { font-size: 12.5px; color: var(--text-2); margin-top: 5px; line-height: 1.55; }

      /* ── Workflow ── */
      .workflow { display: flex; align-items: center; gap: 10px; padding: 8px 0; flex-wrap: wrap; }
      .workflow-step { display: flex; align-items: center; gap: 9px; padding: 12px 16px; background: var(--surface-2);
        border: 1px solid var(--border); border-radius: 12px; font-size: 12.5px; font-weight: 600; transition: all .25s var(--ease); }
      .workflow-step:hover { border-color: var(--brand-1); transform: translateY(-3px); box-shadow: var(--shadow-sm); }
      .workflow-arrow { color: var(--text-3); font-size: 16px; }

      /* ── Tabs ── */
      .tabs { display: flex; gap: 7px; margin-bottom: 18px; flex-wrap: wrap; }
      .tab { padding: 9px 17px; border: 1px solid var(--border); border-radius: 999px; font-size: 12.5px; cursor: pointer;
        background: var(--surface); color: var(--text-2); font-family: inherit; font-weight: 600; transition: all .2s var(--ease); }
      .tab.active { background: var(--grad); color: #fff; border-color: transparent; box-shadow: 0 6px 16px rgba(99,102,241,.28); }
      .tab:hover:not(.active) { border-color: var(--brand-1); color: var(--text); }

      /* ── Tags ── */
      .tag { display: inline-block; padding: 3px 11px; border-radius: 999px; font-size: 11px; font-weight: 700; }
      .tag-green { background: rgba(16,185,129,.13); color: var(--success); }
      .tag-yellow { background: rgba(245,158,11,.14); color: var(--warning); }
      .tag-red { background: rgba(239,68,68,.13); color: var(--danger); }
      .tag-blue { background: rgba(59,130,246,.13); color: var(--info); }

      /* ── Bars ── */
      .bar { height: 7px; border-radius: 4px; background: var(--bg-soft); overflow: hidden; margin-top: 6px; }
      .bar-fill { height: 100%; border-radius: 4px; transition: width .8s var(--ease); }

      /* ── Shimmer ── */
      .shimmer { background: linear-gradient(90deg, var(--bg-soft) 25%, var(--border) 50%, var(--bg-soft) 75%);
        background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }

      /* ══ HERO (Info page) ══ */
      .hero {
        position: relative; overflow: hidden; border-radius: 22px; padding: 44px 44px 40px; margin-bottom: 22px;
        color: #fff; background: linear-gradient(125deg, #0b1020 0%, #1b1f48 45%, #243a6b 100%);
        box-shadow: var(--shadow-lg);
      }
      .hero::before {
        content: ''; position: absolute; right: -80px; top: -80px; width: 320px; height: 320px; border-radius: 50%;
        background: radial-gradient(circle, rgba(99,102,241,.5), transparent 65%); filter: blur(10px);
      }
      .hero::after {
        content: ''; position: absolute; left: -60px; bottom: -100px; width: 280px; height: 280px; border-radius: 50%;
        background: radial-gradient(circle, rgba(6,182,212,.35), transparent 65%); filter: blur(10px);
      }
      .hero > * { position: relative; z-index: 1; }
      .hero .eyebrow { color: #a9b4ff; letter-spacing: .16em; font-size: 11.5px; font-weight: 700; text-transform: uppercase; }
      .hero h1 { font-size: 34px; font-weight: 800; line-height: 1.15; margin: 12px 0; max-width: 760px; }
      .hero p.lead { font-size: 15px; color: #c8cfe6; max-width: 740px; line-height: 1.7; }
      .hero .meta { display: flex; flex-wrap: wrap; gap: 22px; margin-top: 22px; font-size: 13px; color: #aeb6d2; }
      .hero .meta b { color: #fff; font-weight: 600; }

      /* ── Callouts ── */
      .callout { border-radius: 13px; padding: 16px 18px; margin-bottom: 14px; border: 1px solid var(--border);
        background: var(--surface-2); display: flex; gap: 13px; }
      .callout .ic { width: 22px; height: 22px; flex-shrink: 0; }
      .callout h4 { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
      .callout p { font-size: 13px; color: var(--text-2); line-height: 1.6; }
      .callout-info { border-left: 4px solid var(--info); }
      .callout-warning { border-left: 4px solid var(--warning); }
      .callout-danger { border-left: 4px solid var(--danger); }
      .callout-tip { border-left: 4px solid var(--success); }
      .callout-info .ic { color: var(--info); } .callout-warning .ic { color: var(--warning); }
      .callout-danger .ic { color: var(--danger); } .callout-tip .ic { color: var(--success); }

      /* ── Checklist (deliverables) ── */
      .checklist { list-style: none; display: flex; flex-direction: column; gap: 12px; }
      .checklist li { display: flex; gap: 13px; align-items: flex-start; padding: 14px 16px;
        border: 1px solid var(--border); border-radius: 13px; background: var(--surface-2); }
      .check-icon { width: 26px; height: 26px; border-radius: 8px; flex-shrink: 0; display: grid; place-items: center;
        font-size: 14px; font-weight: 800; color: #fff; }
      .check-done { background: var(--success); }
      .check-partial { background: var(--warning); }
      .checklist .c-title { font-size: 13.5px; font-weight: 700; }
      .checklist .c-desc { font-size: 12.5px; color: var(--text-2); margin-top: 3px; line-height: 1.55; }

      /* ── Timeline (methodology phases) ── */
      .timeline { display: flex; flex-direction: column; gap: 4px; }
      .tl-item { display: flex; gap: 16px; padding-bottom: 18px; position: relative; }
      .tl-item:not(:last-child)::before { content: ''; position: absolute; left: 17px; top: 36px; bottom: 0; width: 2px; background: var(--border); }
      .tl-dot { width: 36px; height: 36px; flex-shrink: 0; border-radius: 11px; background: var(--grad); color: #fff;
        display: grid; place-items: center; font-weight: 800; font-size: 13px; font-family: 'Sora'; box-shadow: 0 6px 16px rgba(99,102,241,.3); }
      .tl-body h4 { font-size: 14px; font-weight: 700; }
      .tl-body p { font-size: 12.5px; color: var(--text-2); margin-top: 4px; line-height: 1.6; }
      .tl-tag { font-size: 10.5px; font-weight: 700; color: var(--brand-1); letter-spacing: .04em; }

      /* ── Stat strip ── */
      .stat-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: 1px solid var(--border);
        border-radius: 14px; overflow: hidden; background: var(--surface); }
      .stat-strip .s { padding: 18px 20px; border-right: 1px solid var(--border); }
      .stat-strip .s:last-child { border-right: none; }
      .stat-strip .s .v { font-family: 'Sora'; font-size: 24px; font-weight: 800; }
      .stat-strip .s .l { font-size: 11.5px; color: var(--text-2); margin-top: 4px; }

      /* ── Misc ── */
      .pill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 999px;
        font-size: 11.5px; font-weight: 600; background: var(--bg-soft); color: var(--text-2); }
      .divider { height: 1px; background: var(--border); margin: 18px 0; }
      .prose p { font-size: 13.5px; color: var(--text-2); line-height: 1.75; margin-bottom: 12px; }
      .prose strong { color: var(--text); }

      .findings-list { list-style: none; }
      .findings-list li { padding: 11px 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.6; }
      .findings-list li:last-child { border-bottom: none; }

      /* Utilities */
      .flex-row { display: flex; align-items: center; gap: 8px; }
      .flex-between { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      .wrap { flex-wrap: wrap; }
      .gap-2 { gap: 8px; } .gap-4 { gap: 16px; }
      .mt-2 { margin-top: 8px; } .mt-4 { margin-top: 16px; }
      .mb-2 { margin-bottom: 8px; } .mb-4 { margin-bottom: 16px; }
      .text-sm { font-size: 13px; } .text-xs { font-size: 11px; }
      .text-secondary { color: var(--text-2); } .text-light { color: var(--text-3); }
      .fw-600 { font-weight: 600; } .fw-700 { font-weight: 700; }

      ::-webkit-scrollbar { width: 9px; height: 9px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 6px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

      @media (max-width: 1080px) { .grid-4 { grid-template-columns: 1fr 1fr; } .stat-strip { grid-template-columns: 1fr 1fr; } .stat-strip .s:nth-child(2) { border-right: none; } }
      @media (max-width: 820px) {
        .sidebar { display: none; }
        .main { padding: 20px; }
        .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
        .hero { padding: 30px 24px; } .hero h1 { font-size: 26px; }
        .page-header h2 { font-size: 23px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
